name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout example app
        uses: actions/checkout@v4
        with:
          path: svea-example-laravel

      - name: Checkout SDK as sibling (for path repository)
        uses: actions/checkout@v4
        with:
          repository: nordkit/svea
          path: svea

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        working-directory: svea-example-laravel
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        working-directory: svea-example-laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan migrate --force

      - name: Run tests
        working-directory: svea-example-laravel
        run: vendor/bin/phpunit


